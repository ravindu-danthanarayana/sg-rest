version: "3.9"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: sungreen
      MYSQL_USER: sungreen
      MYSQL_PASSWORD: sungreen_pw
    ports: ["3306:3306"]
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpw"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
    environment:
      BAL_CONFIG_DATA: |
        DB_HOST = "mysql"
        DB_PORT = 3306
        DB_USER = "sungreen"
        DB_PASS = "sungreen_pw"
        DB_NAME = "sungreen"
        JWT_SECRET = "change-me-to-a-long-random-string-please"
        JWT_TTL_SECONDS = 3600
    ports: ["8080:8080"]

  web:
    build: .
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: "http://localhost:8080"
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  mysql_data:
